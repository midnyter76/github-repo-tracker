name: Daily AI Repo Tracker

on:
  schedule:
    - cron: '0 13 * * *'   # D-06: 13:00 UTC = 6am PDT / 5am PST
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # required by git-auto-commit-action (AUTO-03)

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        # persist-credentials: true (default) — needed for commit-back

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Sync with remote
        run: git fetch origin main && git reset --hard FETCH_HEAD

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token masked by Actions; never printed by the script (AUTO-02)
        run: uv run python -m src.collector

      - name: Stage pruned snapshot deletions
        run: |
          DELETED=$(git ls-files --deleted data/ 2>/dev/null)
          if [ -n "$DELETED" ]; then
            echo "$DELETED" | xargs git rm --
          fi

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842  # v5.0.1
        with:
          commit_message: "chore: daily snapshot [skip ci]"
          file_pattern: "data/** reports/**"

      - name: Email daily report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          uv run python - <<'EOF'
          import os, smtplib, glob
          from datetime import datetime, timezone
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from pathlib import Path

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          md_path = f"reports/{today}.md"
          matches = glob.glob(md_path)
          if not matches:
              print(f"No report for {today}, skipping email.")
              raise SystemExit(0)

          md_body = Path(matches[0]).read_text(encoding="utf-8")
          html_path = f"reports/{today}.html"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"AI Repo Tracker — {today}"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = "midnyter@gmail.com"
          msg.attach(MIMEText(md_body, "plain", "utf-8"))  # plain-text part FIRST

          if os.path.exists(html_path):  # graceful fallback if HTML digest missing
              html_body = Path(html_path).read_text(encoding="utf-8")
              msg.attach(MIMEText(html_body, "html", "utf-8"))  # HTML part LAST

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              smtp.send_message(msg)
          print(f"Report emailed for {today}")
          EOF
