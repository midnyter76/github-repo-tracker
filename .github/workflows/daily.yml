name: Daily AI Repo Tracker

on:
  schedule:
    - cron: '0 13 * * *'   # D-06: 13:00 UTC = 6am PDT / 5am PST
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # required by git-auto-commit-action (AUTO-03)

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        # persist-credentials: true (default) — needed for commit-back

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token masked by Actions; never printed by the script (AUTO-02)
        run: uv run python -m src.collector

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily snapshot [skip ci]"
          file_pattern: "data/**"
